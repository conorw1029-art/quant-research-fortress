# live_strategy_allowlist.yaml
# Controls which strategies may run in tick_live_executor.py.
#
# Statuses:
#   DEMO_CANDIDATE     — Eligible for dry-run AND single-strategy demo auto-trade.
#                        Only one strategy should hold this status at a time.
#   ENABLED_DRY_RUN    — Eligible for dry-run only. Not cleared for demo auto-trade.
#   REVIEW_REQUIRED    — Metrics incomplete or trade count too low.
#                        Dry-run only, flagged in banner. Block demo.
#   DISABLED_FOR_LIVE  — Worst-day risk exceeds remaining account runway.
#                        Cannot run in any mode. Kept for audit trail.
#   RESEARCH_ONLY      — Historical record only. Never runs in executor.
#
# Rules:
#   - Dry-run allows: ENABLED_DRY_RUN, DEMO_CANDIDATE, REVIEW_REQUIRED
#   - Demo auto-trade allows: DEMO_CANDIDATE only
#   - Live auto-trade allows: DEMO_CANDIDATE only (Gate 12 also required)
#   - Any strategy explicitly requested via --strategy that is DISABLED_FOR_LIVE exits with error.
#   - Disabled strategies are still logged to the signal log with rejection_reason=allowlist.
#
# AUDIT: 2026-05-17 — Based on live_readiness_audit.md and next_action_report.md.
# $1,000 remaining per account. Any strategy with worst day > $1,000 is disabled.
# Micro contracts reduce full-contract risk by 10x.

